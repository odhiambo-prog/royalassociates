server {
    listen 80;
    server_name www.royalassociates.co.ke;
    return 301 https://royalassociates.co.ke$request_uri;
}

server {
    listen 80;
    server_name royalassociates.co.ke;
    root /var/www/html;
    index index.php index.htm index.html;

    # Compress text responses on the fly (CSS 247KB -> ~40KB, HTML, JS).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

    # Re-resolve the "php" service via Docker's embedded DNS so a recreated
    # php container (new IP) is picked up without restarting nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $upstream_php php:9000;

    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    location ~ /\. {
        deny all;
    }

    location ~* /(?:uploads|files)/.*\.php$ {
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass $upstream_php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME $fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param SERVER_NAME $host;
        fastcgi_read_timeout 300;
    }

    location ~* \.(jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|webp|htc)$ {
        expires max;
        log_not_found off;
        try_files $uri /index.php$is_args$args;
    }

    location ~* \.(js|css)$ {
        expires 30d;
        add_header Cache-Control "public";
        log_not_found off;
        try_files $uri /index.php$is_args$args;
    }
}
